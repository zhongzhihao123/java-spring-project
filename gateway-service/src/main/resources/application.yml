server:
  port: 8000

spring:
  application:
    name: java-gateway
  cloud:
    gateway:
      routes:
        # ── AI 服务 (Python) ──
        - id: nlp-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/nlp/**
          filters:
            - RewritePath=/api/nlp/(?<seg>.*), /api/$\{seg}

        - id: recommend-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/recommend/**
          filters:
            - RewritePath=/api/recommend/(?<seg>.*), /api/$\{seg}

        - id: cv-service
          uri: http://localhost:8003
          predicates:
            - Path=/api/cv/**
          filters:
            - RewritePath=/api/cv/(?<seg>.*), /api/$\{seg}

        - id: mlops-service
          uri: http://localhost:8004
          predicates:
            - Path=/api/mlops/**
          filters:
            - RewritePath=/api/mlops/(?<seg>.*), /api/$\{seg}

        # ── 数据库管理 → Python 内部网关 8005 ──
        - id: dbadmin-service
          uri: http://localhost:8005
          predicates:
            - Path=/api/dbadmin/**

        # ── 健康检查 → Python 内部网关 8005 ──
        - id: health-info
          uri: http://localhost:8005
          predicates:
            - Path=/api/health,/api/info

        # ── Java 微服务（路径透传）──
        - id: user-service
          uri: http://localhost:8101
          predicates:
            - Path=/api/users/**

        - id: business-service
          uri: http://localhost:8102
          predicates:
            - Path=/api/business/**

        - id: notification-service
          uri: http://localhost:8103
          predicates:
            - Path=/api/notifications/**

      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter:
              replenishRate: 100
              burstCapacity: 200

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

jwt:
  enabled: true
  secret: ai-platform-jwt-secret-key-min-256-bits-long-2024
  expiration: 86400000

logging:
  level:
    com.aiplatform: INFO
    org.springframework.cloud.gateway: INFO
