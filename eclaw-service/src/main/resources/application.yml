server:
  port: 8106

spring:
  application:
    name: eclaw-service
  datasource:
    url: jdbc:mysql://localhost:3307/ai_platform?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

# LLM 默认配置(Agent对话时使用)
llm:
  default:
    provider: openai
    api-base: https://api.openai.com/v1
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
